{% extends "base.html" %}

{% block title %}Files - CloudLearn{% endblock %}

{% block content %}
<h1 class="mb-4">S3 File Browser</h1>

<div class="row">
    <div class="col-md-8">
        <div id="filesList">
            <div class="text-center">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">File Management</h5>
                <ul class="small text-muted">
                    <li>View all files in S3</li>
                    <li>Download course materials</li>
                    <li>View thumbnails</li>
                </ul>
                <a href="/upload-course" class="btn btn-primary btn-sm w-100 mt-3">
                    📤 Upload New Files
                </a>
            </div>
        </div>
    </div>
</div>

<script>
async function loadFiles() {
    try {
        const response = await fetch('/files');
        const data = await response.json();
        const filesList = document.getElementById('filesList');

        if (data.files.length === 0) {
            filesList.innerHTML = '<div class="alert alert-info">No files in S3 yet.</div>';
            return;
        }

        filesList.innerHTML = `
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Filename</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.files.map(file => `
                            <tr>
                                <td>
                                    ${file.includes('.png') || file.includes('.jpg') || file.includes('.jpeg') ? '🖼️' : '📄'}
                                    ${file}
                                </td>
                                <td>
                                    <a href="/view-url/${file}" class="btn btn-sm btn-outline-primary" target="_blank">
                                        👁️ View
                                    </a>
                                    <a href="/view-url/${file}" class="btn btn-sm btn-outline-success" download>
                                        ⬇️ Download
                                    </a>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    } catch (error) {
        document.getElementById('filesList').innerHTML = `
            <div class="alert alert-danger">
                Error loading files: ${error.message}
            </div>
        `;
    }
}

loadFiles();
</script>
{% endblock %}
